<!DOCTYPE html>

<html>
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <title>L1 Games</title>
    <script src="script.js" defer></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }
        header {
            width: 100%;
            border: none;
            background-color: #FF5454;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            font-size: 30px;
            text-align: center;
            position: absolute;
			top: -1px;
        }

        .Logbtn {
            border: none;
            background-color: #F5F5F5;
            color: black;
            cursor: pointer;
            top: 0px;
            left: 0px;
            font-size: 30px;
            text-align: center;
            position: absolute;
            padding: 20px;
        }
        .Logbtn:hover {
            transition: 0.5s ease;
            background-color: #FF5454;
        }
        .abutton1 {
            display: none;
            border: none;
            background-color: #F5F5F5;
            color: black;
            cursor: pointer;
            top: 74px;
            left: 0px;
            font-size: 30px;
            text-align: center;
            position: absolute;
            padding: 28px;
			text-decoration: none;
        }
        .ab1nh {
            display: block;
        }
        .abutton1:hover {
            transition: 0.5s ease;
            background-color: #FF5454;
        }
        .abutton2 {
            display: none;
            border: none;
            background-color: #F5F5F5;
            color: black;
            cursor: pointer;
            top: 164px;
            left: 0px;
            font-size: 30px;
            text-align: center;
            position: absolute;
            padding: 46px;
			text-decoration: none;  
        }
        .abutton2:hover {
            transition: 0.5s ease;
            background-color: #FF5454;
        }
        .ab2nh {
            display: block;
        }
        .divuser {
            position: relative; 
            z-index: 9999;
			top: -17px;
            padding: -20px;
        }
        .userimg {
            max-width: 19%;
			display: flex;
            justify-content: flex-end;
			width: 4.6%;
			top: -15px;
        }
		.userp {
		    display: flex;
            justify-content: flex-end;
			position: relative;
			top: 17px;
			left: -20px;
			
		}
        .gamebtn {
            position: relative;
            z-index: 9999;
            top: 50px;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            border: 5px #FF5454 solid;
            border-radius: 10px;
            padding: 10px;
        }
     
        .linkgame {
            background-color: #FF5454;
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            font-weight: 150;
            color: white;
        }
        .linkgame:hover {
            transition: 0.2s ease;
            transform: scale(0.8);
        }
        .gamebar {
            gap: 10px;
            display: grid;
            grid-template-columns: repeat(4, auto);
			place-items: center;
			place-content: center;
        }
        .imggame {
            border-radius: 25px;
        }
        
        .pfooter {
            bottom: 2000px;
        }
        footer {
            background-color: black;
            position: absolute;
            bottom: -800px;
            width: 100%;
            height: 40px;
            color: white;
            height: 20%;
            text-align: center;
        }
        .abutton3 {
            display: none;
            border: none;
            background-color: #F5F5F5;
            color: black;
            cursor: pointer;
            top: 290px;
            left: 0px;
            font-size: 30px;
            text-align: center;
            position: absolute;
            padding: 25px;
            text-decoration: none;
        }
        .ab3nh {
            display: block;
        }
        .abutton3:hover {
            transition: 0.5s ease;
            background-color: #FF5454;
        }
    </style>
</head>
<body>
    <header>L1 Games</header>
    <button class="Logbtn" id="frbtn">Menu ≡</button>
    <a class="abutton1" id="abutton1" href="./login.html">Admin</a>
    <a class="abutton2" id="abutton2" href="http://classroom.google.com">Exit</a>
    <button class="abutton3" id="abutton3" onclick="window.close(); openGame()">Blanco</button>
    <script>
        function openGame() {
            var win = window.open()
            var url = "./index.html"
            var iframe = win.document.createElement('iframe')
            iframe.style.width = "100%"
            iframe.style.height = "100%"
            iframe.style.border = "none"
            iframe.src = url
            win.document.body.appendChild(iframe)
        }</script>
    <div class="divuser">
        <img align="right" srcset="user.png" class="userimg">
    </div>
    <p class="userp">User</p>
    <div class="gamebar">
        <div class="gamebtn">

            <img srcset="ruffle.jpg" />

            <a href="https://ruffle.rs/demo/" class="linkgame">Ruffle Demo</a>

        </div>
        <div class="gamebtn">

            <img class="imggame" srcset="flashgames.png" />

            <a href="./flashgames/" class="linkgame">Flash & JS Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="atari.png" />

            <a href="./atarigames/" class="linkgame">Atari Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="minecraft.jpg" />

            <a href="./mc18.html" class="linkgame">Minecraft 1.8</a>

        </div>
        <div class="gamebtn">

            <img srcset="msdos.png" />

            <a href="./dosgames/" class="linkgame">DOS Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="nconsole.png" />

            <a href="./nconsole/" class="linkgame">Console Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="doszone.png" />

            <a href="https://dos.zone/" class="linkgame">Dos Zone</a>

        </div>
        <div class="gamebtn">

            <img srcset="3d.jpg" />

            <a href="https://cheery-souffle-138a27.netlify.app/futbolperuano.html" class="linkgame">Advanced Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="gpgames.png" />

            <a href="https://www.google.com/search?q=google+games" class="linkgame">Google Games</a>

        </div>
        <div class="gamebtn">

            <img srcset="javag.png" />

            <a href="https://j2me.online" class="linkgame">Jar Emulator</a>

        </div>
        <div class="gamebtn">

            <img srcset="winfy.png" />

            <a href="https://www.winfy.net/" class="linkgame">Winfy</a>

        </div>
        
    </div>
    <footer>
        <p class="pfooter">About:</p>

        <p class="pfooter">L1 Games 2026</p>
    </footer>
</body>

</html>
